name: rsvp_admin
description: RSVP Admin — mobile companion for event management.
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client with interceptors
  dio: ^5.4.3+1

  # State management
  flutter_riverpod: ^2.5.1

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # URL launcher for WhatsApp / iMessage
  url_launcher: ^6.3.0

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # Share functionality
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  custom_lint: ^0.7.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#f8f4ec"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
